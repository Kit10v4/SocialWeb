services:
  db:
    image: postgres:16
    container_name: socialweb-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: social_app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: socialweb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    image: python:3.11-slim
    container_name: socialweb-backend
    working_dir: /app/server
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DB_NAME: social_app_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000,http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./social-app:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python manage.py migrate &&
             daphne config.asgi:application -b 0.0.0.0 -p 8000"

  frontend:
    image: node:20-alpine
    container_name: socialweb-frontend
    working_dir: /app/client
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000/api
      VITE_WS_URL: ws://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./social-app:/app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data:
  redis_data:
