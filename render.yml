services:
  - type: web
    name: social-app-api
    env: python
    rootDir: server # thư mục chứa manage.py và requirements.txt
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
    startCommand: daphne config.asgi:application -b 0.0.0.0 -p $PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "social-app-api-p54k.onrender.com,social-app-api.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: social-app-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://social-app-api-p54k.onrender.com,https://social-app-api.onrender.com,https://your-frontend.vercel.app"
      - key: REDIS_URL
        sync: false

databases:
  - name: social-app-db
    plan: free
    ipAllowList: []
